networks:
    odoo-net:

services:
    db:
        image: postgres:15
        ports:
            - "5432:5432"
        environment:
            POSTGRES_DB: postgres
            POSTGRES_USER: odoo
            POSTGRES_PASSWORD: odoo
        volumes:
            - ./postgresql/data:/var/lib/postgresql/data
        networks:
            - odoo-net
        tty: true   

    pgadmin:
        image: dpage/pgadmin4
        environment:
            PGADMIN_DEFAULT_EMAIL: admin@admin.com
            PGADMIN_DEFAULT_PASSWORD: admin
        ports:
            - "5050:80"
        depends_on:
            - db
        networks:
            - odoo-net
        tty: true   

    odoo:
        image: odoo:18.0
        ports:
            - "8069:8069"
        volumes:
            - ./extra-addons:/mnt/extra-addons
            - ./odoo-data:/var/lib/odoo
            - ./config/odoo.conf:/etc/odoo/odoo.conf            
        environment:
            DB_HOST: db
            DB_PORT: 5432
            DB_USER: odoo
            DB_PASSWORD: odoo
            DB_NAME: postgres           
        depends_on:
            - db
        networks:
            - odoo-net
        tty: true